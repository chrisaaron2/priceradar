# PriceRadar Docker Compose
# PostgreSQL (Chris - Track A)
# Metabase, MLflow, FastAPI (Punith - Track B)
# SHARED FILE: Coordinate via PR before editing

services:
  postgres:
    image: postgres:15
    container_name: priceradar-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-priceradar}
      POSTGRES_USER: ${POSTGRES_USER:-priceradar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-priceradar_dev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres_init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-priceradar}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - priceradar-network

  metabase:
    image: metabase/metabase:latest
    container_name: priceradar-metabase
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - metabase-data:/metabase-data
    depends_on:
      - postgres
    networks:
      - priceradar-network

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: priceradar-mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000
    volumes:
      - mlflow-data:/mlflow
    networks:
      - priceradar-network

volumes:
  postgres-data:
  metabase-data:
  mlflow-data:

networks:
  priceradar-network:
    driver: bridge