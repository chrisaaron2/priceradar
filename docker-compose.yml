version: "3.8"

# PriceRadar Docker Compose
# Day 0: PostgreSQL only (Chris - Track A)
# Punith adds: Metabase, MLflow, FastAPI services later
# SHARED FILE: Coordinate via PR before editing

services:
  postgres:
    image: postgres:15
    container_name: priceradar-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-priceradar}
      POSTGRES_USER: ${POSTGRES_USER:-priceradar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-priceradar_dev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres_init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-priceradar}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - priceradar-network

  # --- Punith's services (Track B) - DO NOT ADD WITHOUT COORDINATING ---
  # metabase:
  # mlflow:
  # fastapi:

volumes:
  postgres-data:

networks:
  priceradar-network:
    driver: bridge
